services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bibliotheque-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/GestionnaireBibliotheque.API/Dockerfile
    container_name: bibliotheque-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      # Surcharge la chaîne "SqlServer" d'appsettings.json (Host = nom du service compose)
      ConnectionStrings__SqlServer: "Server=sqlserver,1433;Database=GestionnaireBibliotheque;User Id=sa;Password=Your_password123;TrustServerCertificate=True;"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  sqlserver-data:
